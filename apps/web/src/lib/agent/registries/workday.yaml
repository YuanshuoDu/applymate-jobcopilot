# Workday employer registry (Phase 2.1+2.2)
# Verified: each entry confirmed via CXS search endpoint (200 + total > 0)
# Country codes: ISO 3166-1 alpha-2, lowercase
# Tier: 1=Fortune 500, 2=large multinational, 3=regional
# baseUrl: includes wd{N} subdomain ? never guess wd3 vs wd5 vs wd10
#
# Verification status key:
#   verified   ? CXS search endpoint confirmed (200 + total>0)
#   pending    ? entry not yet verified (best-guess tenant/siteId)
#   unreachable? endpoint 401/404/422, needs correction
#
# LAST VERIFIED: 2026-05-22 ? most EU tenants return 422 (wrong siteId).
# To find correct siteIds: visit each career site in a browser, open DevTools,
# filter network requests for "cxs" and note tenant/siteId from the URL.
